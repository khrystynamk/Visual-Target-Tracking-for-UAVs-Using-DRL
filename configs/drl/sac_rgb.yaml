# SAC training config — RGB agent
# Input: 3 stacked RGB frames (9, 224, 224)

env:
  use_depth: false
  image_size: 224
  frame_stack: 3
  max_episode_steps: 300
  max_vel: 5.0
  max_yaw_rate: 90.0
  desired_distance: 3.0
  max_distance: 8.0
  min_distance: 0.5

sac:
  total_timesteps: 200000
  learning_rate: 0.0001
  buffer_size: 50000
  batch_size: 256
  learning_starts: 1000
  train_freq: 1
  gamma: 0.99
  tau: 0.005

wandb:
  project: "vtt-uav"
  name: "sac-rgb"

save_dir: "experiments/sac_rgb"
eval_freq: 5000
eval_episodes: 5
