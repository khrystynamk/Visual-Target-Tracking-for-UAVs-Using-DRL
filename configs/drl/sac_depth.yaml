# SAC training config — Depth agent
# Input: 3 stacked depth frames (3, 224, 224)

env:
  image_size: 224
  frame_stack: 3
  max_episode_steps: 300
  max_vel: 5.0
  max_yaw_rate: 229.0
  desired_distance: 2.0
  max_distance: 10.0
  min_distance: 1.0

sac:
  total_timesteps: 500000
  learning_rate: 0.0003
  buffer_size: 30000
  batch_size: 64
  learning_starts: 1000
  train_freq: 8
  gamma: 0.99
  tau: 0.005

wandb:
  project: "vtt-uav"
  name: "sac-depth"

save_dir: "experiments/sac_depth"
eval_freq: 5000
eval_episodes: 5
